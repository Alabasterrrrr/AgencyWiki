name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install mkdocs-material mkdocs-awesome-pages-plugin

      - name: Preprocess Gramax files
        run: |
          find test/ -name "_index.md" | while read f; do
            cp "$f" "$(dirname $f)/index.md"
          done

      - name: Deploy to GitHub Pages
        run: |
          mkdocs gh-deploy --force
